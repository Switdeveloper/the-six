<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — The Six AI</title>
  <meta name="description" content="Get in touch with The Six AI. Ready to transform your business? Contact us today." />
  <link rel="icon" href="assets/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-effects">
    <div class="grid-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- Header loaded via partials -->
  <div id="header-placeholder"></div>

  <main>
    <section class="contact-page">
      <div class="container">
        <div class="contact-header reveal">
          <h1>Get in <span class="text-gradient">Touch</span></h1>
          <p>Have a project in mind? We'd love to hear from you. Send us a message and we'll get back to you within 24 hours.</p>
        </div>

        <div class="contact-wrapper">
          <!-- Contact Info Cards -->
          <div class="contact-info reveal">
            <div class="info-card">
              <div class="info-icon">📧</div>
              <div class="info-content">
                <h3>Email Us</h3>
                <a href="mailto:contact@thesixai.ca">contact@thesixai.ca</a>
              </div>
            </div>
            
            <div class="info-card">
              <div class="info-icon">📍</div>
              <div class="info-content">
                <h3>Location</h3>
                <p>San Francisco, CA</p>
              </div>
            </div>
            
            <div class="info-card">
              <div class="info-icon">⏰</div>
              <div class="info-content">
                <h3>Response Time</h3>
                <p>Within 24 hours</p>
              </div>
            </div>
            
            <div class="info-card">
              <div class="info-icon">💬</div>
              <div class="info-content">
                <h3>Live Chat</h3>
                <p>Available 9am-6pm PST</p>
              </div>
            </div>
          </div>

          <!-- Contact Form -->
          <div class="contact-form-card reveal">
            <form id="contactForm">
              <h3>Send us a Message</h3>
              
              <div class="form-row">
                <div class="form-group">
                  <label for="name">Name *</label>
                  <input type="text" id="name" name="name" placeholder="Your name" required />
                </div>
                <div class="form-group">
                  <label for="email">Email *</label>
                  <input type="email" id="email" name="email" placeholder="your@email.com" required />
                </div>
              </div>
              
              <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="What is this about?" />
              </div>
              
              <div class="form-group">
                <label for="message">Message *</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your project, goals, and timeline..." required></textarea>
              </div>
              
              <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                <span>Send Message</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer loaded via partials -->
  <div id="footer-placeholder"></div>

  <script src="partials-loader.js"></script>
  <script>
    // Contact form handler (works with or without partials)
    document.addEventListener('submit', function(e) {
      if (e.target && e.target.id === 'contactForm') {
        e.preventDefault();
        var btn = document.getElementById('submitBtn');
        if (!btn) return;
        
        var original = btn.innerHTML;
        btn.innerHTML = '<span>Sending...</span>';
        btn.disabled = true;
        
        setTimeout(function() {
          btn.innerHTML = '<span>✓ Sent!</span>';
          btn.style.background = 'hsl(160, 84%, 39%)';
          e.target.reset();
          
          setTimeout(function() {
            btn.innerHTML = original;
            btn.style.background = '';
            btn.disabled = false;
          }, 2500);
        }, 1200);
      }
    });
  </script>
</body>
</html>
